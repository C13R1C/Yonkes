{% load static %}
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Iniciar sesión</title><link rel="stylesheet" href="{% static 'css/base.css' %}"></head>
<body><main class="auth-shell"><section class="card auth-card"><h1>Red de Yonkes</h1><h2 class="card-title">Iniciar sesión</h2>{% if error %}<div class="form-errors">{{ error }}</div>{% endif %}<form method="post" class="form-grid">{% csrf_token %}<input type="hidden" name="next" value="{{ next }}"><div class="form-group full-width"><label class="form-label">Usuario</label><input class="form-control" name="username" required></div><div class="form-group full-width"><label class="form-label">Contraseña</label><input class="form-control" name="password" type="password" required></div><div class="form-group full-width inline-actions"><button class="btn btn-primary" type="submit">Iniciar sesión</button><a class="btn btn-secondary" href="/register/">Crear cuenta</a></div></form></section></main></body></html>
