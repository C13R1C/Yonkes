{% load static %}
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Registro</title><link rel="stylesheet" href="{% static 'css/base.css' %}"></head>
<body><main class="auth-shell"><section class="card auth-card"><h1>Red de Yonkes</h1><h2 class="card-title">Crear cuenta</h2><form method="post" class="form-grid">{% csrf_token %}{% if form.non_field_errors %}<div class="form-errors full-width">{{ form.non_field_errors }}</div>{% endif %}{% for field in form %}<div class="form-group full-width"><label class="form-label">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="field-error">{{ field.errors|striptags }}</div>{% endif %}</div>{% endfor %}<div class="form-group full-width inline-actions"><button class="btn btn-primary" type="submit">Registrarme</button><a class="btn btn-secondary" href="/login/">Ya tengo cuenta</a></div></form></section></main></body></html>
